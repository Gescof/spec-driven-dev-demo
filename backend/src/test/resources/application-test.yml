spring:
  datasource:
    # Semicolons in the H2 URL require quoting
    url: "jdbc:h2:mem:petshop_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  security:
    user:
      name: test
      password: test

petshop:
  cors:
    allowed-origins: http://localhost:5500
