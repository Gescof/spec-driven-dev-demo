<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Shop — Catalog</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="nav">
        <a class="nav__brand" href="index.html">PetShop</a>
        <ul class="nav__links">
            <li><a href="catalog.html">Catalog</a></li>
            <li class="nav__cart-item"><a href="cart.html">Cart <span id="nav-cart-count" class="cart-badge" style="display:none">0</span></a></li>
            <li class="nav__auth-guest"><a href="login.html">Login</a></li>
            <li class="nav__auth-guest"><a href="register.html">Register</a></li>
            <li class="nav__auth-user" style="display:none"><a href="account.html">Account</a></li>
            <li class="nav__auth-user" style="display:none"><a href="#" id="nav-logout">Logout</a></li>
        </ul>
    </nav>

    <main class="catalog-layout">
        <header class="catalog-header">
            <h1>Product Catalog</h1>
            <input class="search-input" id="search-input" type="search" placeholder="Search products…" aria-label="Search products">
        </header>

        <div id="category-filters" class="category-filters" role="group" aria-label="Filter by category"></div>

        <div id="product-grid" class="product-grid"></div>
        <p id="no-results" class="empty-state" style="display:none">No products found. <a href="catalog.html">Browse all categories.</a></p>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/catalog.js"></script>
</body>
</html>
