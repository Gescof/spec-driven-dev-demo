<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Shop — My Account</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="nav">
        <a class="nav__brand" href="index.html">PetShop</a>
        <ul class="nav__links">
            <li><a href="catalog.html">Catalog</a></li>
            <li class="nav__cart-item"><a href="cart.html">Cart <span id="nav-cart-count" class="cart-badge" style="display:none">0</span></a></li>
            <li class="nav__auth-guest"><a href="login.html">Login</a></li>
            <li class="nav__auth-guest"><a href="register.html">Register</a></li>
            <li class="nav__auth-user" style="display:none"><a href="account.html">Account</a></li>
            <li class="nav__auth-user" style="display:none"><a href="#" id="nav-logout">Logout</a></li>
        </ul>
    </nav>

    <main class="account-layout">
        <aside class="account-sidebar">
            <section id="profile-section" class="card">
                <h2>My Profile</h2>
                <p><strong>Name:</strong> <span id="profile-name"></span></p>
                <p><strong>Email:</strong> <span id="profile-email"></span></p>
                <p><strong>Member since:</strong> <span id="profile-since"></span></p>
                <form id="profile-update-form" class="profile-form">
                    <div class="form-group">
                        <label for="update-name">Update Name</label>
                        <input id="update-name" type="text" name="name">
                    </div>
                    <p id="profile-error" class="field-error" style="display:none"></p>
                    <p id="profile-success" class="success-msg" style="display:none">Profile updated!</p>
                    <button class="btn btn--secondary" type="submit">Save</button>
                </form>
                <button class="btn btn--outline" id="logout-btn" style="margin-top:1rem">Logout</button>
            </section>
        </aside>

        <section class="account-orders">
            <h2>Order History</h2>
            <div id="order-history"></div>
            <p id="orders-empty" class="empty-state" style="display:none">No orders yet — <a href="catalog.html">start shopping!</a></p>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/account.js"></script>
</body>
</html>
