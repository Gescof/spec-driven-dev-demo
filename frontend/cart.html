<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Shop — Cart</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="nav">
        <a class="nav__brand" href="index.html">PetShop</a>
        <ul class="nav__links">
            <li><a href="catalog.html">Catalog</a></li>
            <li class="nav__cart-item"><a href="cart.html">Cart <span id="nav-cart-count" class="cart-badge" style="display:none">0</span></a></li>
            <li class="nav__auth-guest"><a href="login.html">Login</a></li>
            <li class="nav__auth-guest"><a href="register.html">Register</a></li>
            <li class="nav__auth-user" style="display:none"><a href="account.html">Account</a></li>
            <li class="nav__auth-user" style="display:none"><a href="#" id="nav-logout">Logout</a></li>
        </ul>
    </nav>

    <main class="cart-layout">
        <h1>Shopping Cart</h1>
        <p id="cart-empty" class="empty-state" style="display:none">Your cart is empty. <a href="catalog.html">Browse products</a></p>
        <div id="cart-content" style="display:none">
            <table class="cart-table" aria-label="Cart items">
                <thead>
                    <tr>
                        <th scope="col">Product</th>
                        <th scope="col">Unit Price</th>
                        <th scope="col">Quantity</th>
                        <th scope="col">Total</th>
                        <th scope="col"><span class="sr-only">Remove</span></th>
                    </tr>
                </thead>
                <tbody id="cart-table-body"></tbody>
            </table>
            <div class="cart-summary">
                <strong>Grand Total: <span id="grand-total">$0.00</span></strong>
            </div>
            <a id="checkout-link" class="btn btn--primary" href="checkout.html">Proceed to Checkout</a>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
