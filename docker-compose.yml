services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-petshop}
      POSTGRES_USER: ${POSTGRES_USER:-petshop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-petshop_secret}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-petshop}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-petshop}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-petshop}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-petshop_secret}

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  postgres_data:
