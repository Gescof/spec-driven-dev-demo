openapi: "3.0.3"
info:
  title: Pet Shop Web App API
  version: "1.0.0"
  description: |
    REST API for the Pet Shop Web App. All endpoints are prefixed with `/api/v1/`.
    Authentication uses session-based cookies (JSESSIONID). Clients must send
    `credentials: 'include'` with every fetch request.

servers:
  - url: http://localhost:8080/api/v1
    description: Local development

tags:
  - name: auth
    description: Registration, login, logout
  - name: categories
    description: Product categories (read-only for v1)
  - name: products
    description: Product catalog (read-only for v1)
  - name: cart
    description: Shopping cart management (authenticated)
  - name: orders
    description: Order placement and history (authenticated)
  - name: users
    description: User profile management (authenticated)

paths:

  # ─────────────────────────────────────────────
  # Auth
  # ─────────────────────────────────────────────

  /auth/register:
    post:
      tags: [auth]
      summary: Register a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        "201":
          description: Account created; session started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "400":
          description: Validation error (invalid email format, password too short, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /auth/login:
    post:
      tags: [auth]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: Login successful; session cookie set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [auth]
      summary: End the current session
      responses:
        "204":
          description: Session ended; JSESSIONID cookie cleared
        "401":
          description: Not authenticated

  /auth/me:
    get:
      tags: [auth]
      summary: Get current session user (ping endpoint for session check)
      responses:
        "200":
          description: Authenticated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        "401":
          description: Not authenticated

  # ─────────────────────────────────────────────
  # Categories
  # ─────────────────────────────────────────────

  /categories:
    get:
      tags: [categories]
      summary: List all product categories
      responses:
        "200":
          description: Array of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'

  # ─────────────────────────────────────────────
  # Products
  # ─────────────────────────────────────────────

  /products:
    get:
      tags: [products]
      summary: List products with optional filtering and search
      parameters:
        - name: categoryId
          in: query
          required: false
          description: Filter by category ID
          schema:
            type: integer
            format: int64
        - name: search
          in: query
          required: false
          description: Keyword search on product name and description
          schema:
            type: string
            maxLength: 200
        - name: available
          in: query
          required: false
          description: Filter by availability (default true)
          schema:
            type: boolean
            default: true
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated list of products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPage'

  /products/{id}:
    get:
      tags: [products]
      summary: Get full product detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products/featured:
    get:
      tags: [products]
      summary: Get featured products for the home page (first 8 available products)
      responses:
        "200":
          description: Array of featured products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductSummary'

  # ─────────────────────────────────────────────
  # Cart  (authenticated)
  # ─────────────────────────────────────────────

  /cart:
    get:
      tags: [cart]
      summary: Get current user's cart
      security:
        - sessionCookie: []
      responses:
        "200":
          description: The user's cart with all items and totals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        "401":
          description: Not authenticated

  /cart/items:
    post:
      tags: [cart]
      summary: Add a product to the cart (or increment quantity if already present)
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddToCartRequest'
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        "400":
          description: Validation error or product not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Not authenticated
        "404":
          description: Product not found

  /cart/items/{productId}:
    put:
      tags: [cart]
      summary: Update quantity of a product in the cart
      security:
        - sessionCookie: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCartItemRequest'
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Not authenticated
        "404":
          description: Cart item not found
    delete:
      tags: [cart]
      summary: Remove a product from the cart
      security:
        - sessionCookie: []
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Updated cart after removal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        "401":
          description: Not authenticated
        "404":
          description: Cart item not found

  # ─────────────────────────────────────────────
  # Orders  (authenticated)
  # ─────────────────────────────────────────────

  /orders:
    get:
      tags: [orders]
      summary: Get current user's order history
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Array of orders (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderSummary'
        "401":
          description: Not authenticated
    post:
      tags: [orders]
      summary: Place an order from the current cart
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceOrderRequest'
      responses:
        "201":
          description: Order placed; cart cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
        "400":
          description: Cart is empty or contains out-of-stock products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Not authenticated

  /orders/{id}:
    get:
      tags: [orders]
      summary: Get full order detail
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Full order with line items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
        "401":
          description: Not authenticated
        "403":
          description: Order does not belong to current user
        "404":
          description: Order not found

  # ─────────────────────────────────────────────
  # Users (authenticated)
  # ─────────────────────────────────────────────

  /users/me:
    get:
      tags: [users]
      summary: Get current user profile
      security:
        - sessionCookie: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        "401":
          description: Not authenticated
    put:
      tags: [users]
      summary: Update current user profile (name and/or password)
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        "401":
          description: Not authenticated

# ─────────────────────────────────────────────
# Components
# ─────────────────────────────────────────────

components:

  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: JSESSIONID

  schemas:

    # ── Auth ──────────────────────────────────

    RegisterRequest:
      type: object
      required: [email, name, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        name:
          type: string
          minLength: 1
          maxLength: 200
        password:
          type: string
          minLength: 8
          description: Raw password (never stored; BCrypt-hashed server-side)

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    # ── Users ─────────────────────────────────

    UserProfile:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        name:
          type: string
        registeredAt:
          type: string
          format: date-time

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        currentPassword:
          type: string
          description: Required when changing password
        newPassword:
          type: string
          minLength: 8

    # ── Categories ────────────────────────────

    Category:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
          nullable: true

    # ── Products ──────────────────────────────

    ProductSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        price:
          type: number
          format: double
        imageUrl:
          type: string
          nullable: true
        available:
          type: boolean
        category:
          $ref: '#/components/schemas/Category'

    ProductDetail:
      allOf:
        - $ref: '#/components/schemas/ProductSummary'
        - type: object
          properties:
            description:
              type: string

    ProductPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ProductSummary'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        page:
          type: integer
        size:
          type: integer

    # ── Cart ──────────────────────────────────

    CartItem:
      type: object
      properties:
        productId:
          type: integer
          format: int64
        productName:
          type: string
        productImageUrl:
          type: string
          nullable: true
        unitPrice:
          type: number
          format: double
        quantity:
          type: integer
          minimum: 1
        lineTotal:
          type: number
          format: double
        available:
          type: boolean
          description: False if product went out of stock after being added

    Cart:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        grandTotal:
          type: number
          format: double
        itemCount:
          type: integer

    AddToCartRequest:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: integer
          format: int64
        quantity:
          type: integer
          minimum: 1
          default: 1

    UpdateCartItemRequest:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
          minimum: 1

    # ── Orders ────────────────────────────────

    OrderSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
        orderNumber:
          type: string
          example: ORD-a1b2c3d4-e5f6-...
        status:
          type: string
          enum: [CONFIRMED]
        placedAt:
          type: string
          format: date-time
        totalAmount:
          type: number
          format: double
        itemCount:
          type: integer

    OrderLineItem:
      type: object
      properties:
        productId:
          type: integer
          format: int64
        productName:
          type: string
          description: Snapshot of product name at order time
        unitPrice:
          type: number
          format: double
          description: Snapshot of product price at order time
        quantity:
          type: integer
        lineTotal:
          type: number
          format: double

    OrderDetail:
      allOf:
        - $ref: '#/components/schemas/OrderSummary'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/OrderLineItem'

    PlaceOrderRequest:
      type: object
      description: |
        Simulated checkout for v1. No real payment data is collected.
        The request body carries simulated payment form fields for UI demo purposes only.
      properties:
        cardholderName:
          type: string
          description: Displayed on confirmation page only; not stored
        cardNumberLast4:
          type: string
          pattern: '^\d{4}$'
          description: Last 4 digits only; not stored

    # ── Errors ────────────────────────────────

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    ValidationErrorResponse:
      type: object
      properties:
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        fieldErrors:
          type: object
          additionalProperties:
            type: string
          description: Map of field name → error message
        timestamp:
          type: string
          format: date-time
